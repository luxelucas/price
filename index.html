<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鋼板智慧報價系統 | Steel Quote System</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- App Background -->
    <div class="app-bg">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <!-- Top Navigation / Action Bar -->
    <header class="top-nav">
        <div class="logo">
            <div class="logo-icon"></div>
            <h1>Steel<span>Quote</span></h1>
        </div>
    </header>

    <div class="container">
        <!-- Database Connection Status -->
        <div style="text-align: right; margin-bottom: -10px;">
            <span id="connection-status" class="status-msg text-muted">連線中...</span>
        </div>

        <!-- Search Panel -->
        <section class="panel glass">
            <div class="panel-header">
                <h2>鋼板厚度查詢</h2>
            </div>
            <div class="search-form">
                <p class="form-hint">請輸入您要搜尋的鋼板厚度 (最多可輸入 5 個)</p>
                <div class="thickness-inputs">
                    <input type="number" class="thick-input" step="0.1" placeholder="厚度 1">
                    <input type="number" class="thick-input" step="0.1" placeholder="厚度 2">
                    <input type="number" class="thick-input" step="0.1" placeholder="厚度 3">
                    <input type="number" class="thick-input" step="0.1" placeholder="厚度 4">
                    <input type="number" class="thick-input" step="0.1" placeholder="厚度 5">
                </div>
                <button id="search-btn" class="primary-btn search-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    搜尋庫存
                </button>
            </div>
        </section>

        <!-- Results Area -->
        <section class="panel glass results-panel" id="results-panel" style="display: none;">
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h2 style="margin-bottom: 0.5rem;">搜尋結果</h2>
                    <div class="result-stats" id="result-stats" style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 1rem;"></div>
                </div>
                <button id="summary-quote-btn" class="primary-btn pulse">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    檢視已選鋼板
                </button>
            </div>
            
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>厚度</th>
                            <th>種類</th>
                            <th>庫存片數</th>
                            <th>單價</th>
                            <th>選購數量</th>
                        </tr>
                    </thead>
                    <tbody id="results-body">
                        <!-- Content injected via JS -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Quote Summary Modal -->
    <div id="quote-modal" class="modal-overlay">
        <div class="modal-content glass" style="max-width: 600px;">
            <div class="modal-header">
                <h2>已選擇鋼板清單</h2>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body" id="quote-print-area">
                <table class="quote-summary-table">
                    <thead>
                        <tr>
                            <th>厚度</th>
                            <th>種類</th>
                            <th>片數</th>
                            <th>價格</th>
                        </tr>
                    </thead>
                    <tbody id="quote-summary-body">
                        <!-- Injected via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
